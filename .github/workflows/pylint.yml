name: Pylint badge

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-badge:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pylint
      - name: Run pylint and generate badge JSON
        shell: bash
        run: |
          mkdir -p public
          pylint_output=$(pylint src/ho_optim_milp --exit-zero)
          echo "$pylint_output"
          score=$(echo "$pylint_output" | sed -n 's/.*rated at \([-0-9.]*\)\/10.*/\1/p' | tail -n 1)
          if [ -z "$score" ]; then
            echo "Could not extract pylint score."
            exit 1
          fi
          export PYLINT_SCORE="$score"
          python - <<'PY'
          import json
          import os
          score = float(os.environ["PYLINT_SCORE"])
          if score >= 9.5:
              color = "brightgreen"
          elif score >= 9.0:
              color = "green"
          elif score >= 8.0:
              color = "yellowgreen"
          elif score >= 7.0:
              color = "yellow"
          elif score >= 5.0:
              color = "orange"
          else:
              color = "red"
          payload = {
              "schemaVersion": 1,
              "label": "pylint",
              "message": f"{score:.2f}/10",
              "color": color
          }
          with open("public/pylint-badge.json", "w", encoding="utf-8") as f:
              json.dump(payload, f)
          PY
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - id: deployment
        uses: actions/deploy-pages@v4
